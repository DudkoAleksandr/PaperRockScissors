<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="body">
    <section class="score">
      <div class="score__maine">
        <h2 class="score__title">Player</h2>
        <p class="score__result-player">0</p>
        <div class="img__player"></div>
      </div>
      <div class="score__maine">
        <h2 class="score__title">Computer</h2>
        <p class="score__result-computer">0</p>
        <div class="img__computer"></div>
      </div>
    </section>
    <section class="start">
      <div class="main">
        <h1 class="main__title">Rock, Paper and Scissors</h1>
        <button class="btn main__btn-play">Lets Play</button>
      </div>
    </section>
    <section class="game hide__game">
      <div class="game__main">
        <p class="result__text"></p>
        <h1 class="main__titles-option">Choose an option</h1>
        <div class="btn__section hide__game">
          <button class="btn btn__rock">rock</button>
          <button class="btn btn__paper">paper</button>
          <button class="btn btn__scissors">scissors</button>
          <button class="btn btn__exit">Exit</button>
        </div>
      </div>
    </section>
    <script src="./script.js"></script>
    <script src="./function.js"></script>
  </body>
</html>
